<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
  <script src="https://cdn.jsdelivr.net/npm/http-vue-loader@1.4.0/src/httpVueLoader.min.js"></script>
  <script src="es6-promise.auto.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/vue2-animate/dist/vue2-animate.min.css" />
  <!-- for support old -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900|Material+Icons" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@3.x/css/materialdesignicons.min.css" rel="stylesheet"> 
  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <title>Yuk Homepage</title>
</head>

<body>
  <v-app id='app'>
    <v-navigation-drawer app>
      <v-layout align-center column fill-height py-5>
        <h2 class="display-2 font-weight-black primary--text mt-12">Developer</h2>
        <div class="display-1 mb-12">Yuk Yong Soo</div>
        <div>
          <v-btn text @click="$vuetify.goTo('#short')">About Me</v-btn>
        </div>
        <div>
          <v-btn text @click="$vuetify.goTo('#skill')">Skill</v-btn>
        </div>
        <div>
          <v-btn text @click="$vuetify.goTo('#skillset')">Base SkillSet</v-btn>
        </div>
        <div>
          <v-btn text @click="$vuetify.goTo('#history')">career History</v-btn>
        </div>
        <div>
          <v-btn text @click="$vuetify.goTo('#dev')">Personal developing</v-btn>
        </div>
        <v-card class="transparent mt-auto">

          <v-list-item two-line>
            <v-list-item-icon>
              <v-icon class="blue--text text--lighten-2">phone</v-icon>
            </v-list-item-icon>
            <v-list-item-content>
              <v-list-item-title>010-5004-7887</v-list-item-title>
            </v-list-item-content>
          </v-list-item>

          <v-list-item two-line>
            <v-list-item-icon>
              <v-icon class="blue--text text--lighten-2">place</v-icon>
            </v-list-item-icon>
            <v-list-item-content>
              <v-list-item-title>Seoul, KR</v-list-item-title>
            </v-list-item-content>
          </v-list-item>

          <v-list-item two-line>
            <v-list-item-icon>
              <v-icon class="blue--text text--lighten-2">email</v-icon>
            </v-list-item-icon>
            <v-list-item-content>
              <v-list-item-title>yozx9079@naver.com</v-list-item-title>
            </v-list-item-content>
          </v-list-item>

          <v-list-item two-line>
            <v-list-item-icon>
              <v-icon class="blue--text text--lighten-2">storage</v-icon>
            </v-list-item-icon>
            <v-list-item-content>
              <v-list-item-title>github.com/yukyongsoo</v-list-item-title>
            </v-list-item-content>
          </v-list-item>

        </v-card>
      </v-layout>
    </v-navigation-drawer>

    <v-content>
      <logo-component></logo-component>
      <v-container fluid>
        <short-component id="short"></short-component>
        <skill-component id="skill"></skill-component>
        <skillset-component id="skillset"></skillset-component>
        <history-component id="history"></history-component>
        <dev-component id="dev"></dev-component>
      </v-container>
    </v-content>

    <v-footer class="blue darken-2" app>
      <div class="white--text ml-5">Made with<v-icon class="red--text">favorite</v-icon>
        by <a class="white--text" href="https://github.com/yukyongsoo">Yuk Yongsoo</a>
        . Copyright ©Yuk Yong Soo, All rights reserved.
      </div>
    </v-footer>
  </v-app>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="main.js"></script>
</body>

</html>
