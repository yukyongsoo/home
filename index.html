<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
  <script src="https://cdn.jsdelivr.net/npm/http-vue-loader@1.4.0/src/httpVueLoader.min.js"></script>
  <script src="es6-promise.auto.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/vue2-animate/dist/vue2-animate.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify/dist/vuetify.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons" />
  <link rel="stylesheet" href="style.css" />
  <title>Yuk Homepage</title>
</head>

<body>
  <v-app id='app' dark>
    <v-navigation-drawer app>
      <v-layout align-center column fill-height py-5>
        <h2 class="display-3 font-weight-black primary--text mb-2">Developer</h2>
        <div class="display-1 mb-5">Yuk Yong Soo</div>
        <div>
          <v-btn flat @click="$vuetify.goTo('#short')">Short Career</v-btn>
        </div>
        <div>
          <v-btn flat @click="$vuetify.goTo('#skill')">Learn Skill</v-btn>
        </div>
        <div>
          <v-btn flat @click="$vuetify.goTo('#dev')">Personal developing</v-btn>
        </div>
        <div>
          <v-btn flat @click="$vuetify.goTo('#history')">Project History</v-btn>
        </div>
        <div>
          <v-btn flat @click="$vuetify.goTo('#contact')">Contact Me</v-btn>
        </div>
        <v-list class="transparent mt-auto">
          <v-list-tile>
            <v-list-tile-action>
              <v-icon class="blue--text text--lighten-2">phone</v-icon>
            </v-list-tile-action>
            <v-list-tile-content>
              <v-list-tile-title>010-5004-7887</v-list-tile-title>
            </v-list-tile-content>
          </v-list-tile>
          <v-list-tile>
            <v-list-tile-action>
              <v-icon class="blue--text text--lighten-2">place</v-icon>
            </v-list-tile-action>
            <v-list-tile-content>
              <v-list-tile-title>Seoul, KR</v-list-tile-title>
            </v-list-tile-content>
          </v-list-tile>
          <v-list-tile>
            <v-list-tile-action>
              <v-icon class="blue--text text--lighten-2">email</v-icon>
            </v-list-tile-action>
            <v-list-tile-content>
              <v-list-tile-title>yozx9079@naver.com</v-list-tile-title>
            </v-list-tile-content>
          </v-list-tile>
          <v-list-tile>
            <v-list-tile-action>
              <v-icon class="blue--text text--lighten-2">storage</v-icon>
            </v-list-tile-action>
            <v-list-tile-content>
              <v-list-tile-title>github.com/yukyongsoo</v-list-tile-title>
            </v-list-tile-content>
          </v-list-tile>
        </v-list>
      </v-layout>
    </v-navigation-drawer>

    <v-content>
      <div>
        <logo-component></logo-component>
        <v-container fluid>
          <short-component id="short"></short-component>
          <skill-component id="skill"></skill-component>
          <dev-component id="dev"></dev-component>
          <history-component id="history"></history-component>
        </v-container>
      </div>
    </v-content>

    <v-footer class="blue darken-2" app>       
          <div class="white--text ml-5">Made with<v-icon class="red--text">favorite</v-icon>
            by <a class="white--text" href="https://github.com/yukyongsoo">Yuk Yongsoo</a>
            . Copyright ©Yuk Yong Soo, All rights reserved.
          </div>      
    </v-footer>
  </v-app>
  <!-- <script src="/webjars/vue/2.5.16/vue.min.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify/dist/vuetify.js"></script>
  <script src="main.js"></script>
</body>

</html>
